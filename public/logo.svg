<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF9E6" />
      <stop offset="50%" stop-color="#C9A227" />
      <stop offset="100%" stop-color="#8C6E15" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Outer Shield Outline -->
  <path d="M 50,5 A 44,44 0 0,0 8,30 C 8,58 30,85 50,95 C 70,85 92,58 92,30 A 44,44 0 0,0 50,5 Z" 
        fill="none" stroke="url(#goldGradient)" stroke-width="2.5" stroke-linecap="round" />
  <!-- Inner Shield Accent -->
  <path d="M 50,11 A 38,38 0 0,0 14,32 C 14,54 32,77 50,86 C 68,77 86,54 86,32 A 38,38 0 0,0 50,11 Z" 
        fill="none" stroke="url(#goldGradient)" stroke-width="1" opacity="0.6" stroke-dasharray="2,2" />
  <!-- Star Symbol representing Leadership & Policing -->
  <polygon points="50,18 53,25 61,25 54,29 57,36 50,32 43,36 46,29 39,25 47,25" 
           fill="url(#goldGradient)" />
  <!-- Book Motif (Open Pages) representing Education & Authorship -->
  <path d="M 28,62 C 38,58 46,62 50,65 C 54,62 62,58 72,62 L 72,48 C 62,44 54,48 50,51 C 46,48 38,44 28,48 Z" 
        fill="none" stroke="url(#goldGradient)" stroke-width="2" stroke-linejoin="round" />
  <line x1="50" y1="51" x2="50" y2="65" stroke="url(#goldGradient)" stroke-width="2" />
  <!-- Initials "SB" (Sylendra Babu) -->
  <text x="50" y="45" font-family="'Playfair Display', 'Georgia', serif" font-size="16" font-weight="900" 
        fill="url(#goldGradient)" text-anchor="middle" letter-spacing="1">DSB</text>
</svg>
